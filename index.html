<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐍 멘토링 파이썬 기말 — 인터랙티브 학습</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <div class="brand">🐍 파이썬 기말 <span class="brand-sub">인터랙티브 학습</span></div>
  <div class="topctrl">
    <input id="search" type="search" placeholder="🔍 문제·해설 검색…" autocomplete="off" aria-label="문제·해설 검색">
    <button id="themeBtn" title="다크/라이트" aria-label="다크/라이트 모드 전환">🌙</button>
  </div>
  <div id="progwrap"><div id="progbar"></div><span id="progtext"></span></div>
</header>

<nav id="nav">
  <button data-view="learn" class="on">📚 학습</button>
  <button data-view="review">🔁 복습<span id="reviewCount" class="navbadge"></span></button>
  <button data-view="predict">🔮 예측</button>
  <button data-view="dashboard">📊 대시보드</button>
  <button data-view="exam">📝 모의시험</button>
</nav>

<nav id="filters">
  <div class="frow" id="chapFilter"></div>
  <div class="frow">
    <div class="seg" id="typeFilter">
      <button data-type="all" class="on">전체유형</button>
      <button data-type="obj">객관식</button>
      <button data-type="sub">주관식</button>
    </div>
    <div class="seg" id="statusFilter">
      <button data-st="all" class="on">전체</button>
      <button data-st="unseen">안 푼 것</button>
      <button data-st="wrong">틀린 것</button>
      <button data-st="bookmark">★ 북마크</button>
    </div>
    <button id="resetBtn" class="ghost" title="진도·기록 초기화">⟲ 기록 초기화</button>
  </div>
  <div class="frow" id="conceptFilterRow"></div>
</nav>

<main id="main"></main>

<div id="toast"></div>

<!-- 🤖 AI 도우미 (서버리스 프록시 경유 — 멘티는 키 입력 없음) -->
<button id="aiFab" aria-label="AI 도우미 열기" title="AI 도우미">🤖</button>
<div id="aichatBg" hidden></div>
<aside id="aichat" aria-label="AI 학습 도우미">
  <div class="ai-c-head"><span>🤖 AI 학습 도우미</span>
    <span class="ai-c-actions"><button id="aiChatClear" title="대화 지우기" aria-label="대화 지우기">🗑</button><button id="aiChatClose" aria-label="닫기">✕</button></span></div>
  <div id="aiCtxBar"></div>
  <div id="aiThread"></div>
  <form id="aiForm">
    <textarea id="aiInput" rows="2" placeholder="파이썬·문제에 대해 물어보세요 (Enter 전송)"></textarea>
    <div class="ai-compose-bar">
      <div class="ai-model-pick">
        <button type="button" id="aiModelBtn" class="ai-model-btn" aria-haspopup="listbox" aria-expanded="false"><span id="aiModelCur"></span><span class="ai-chev">▾</span></button>
        <div id="aiModelMenu" class="ai-model-menu" role="listbox" hidden></div>
      </div>
      <span class="ai-spacer"></span>
      <button id="aiSend" class="btn" type="submit">전송</button>
    </div>
  </form>
  <div class="ai-c-foot">답변은 AI가 생성하며 부정확할 수 있어요. 해설을 함께 확인하세요.</div>
</aside>

<!-- 관리자(멘토) 설정: 아래 따옴표 안에 배포한 프록시 워커 주소를 넣으세요. (proxy/README.md 참고) -->
<script>
  window.MENTO_AI_PROXY = "https://mento-ai-one.vercel.app/api/ai";
  window.MENTO_AI_TOKEN = "";   // (선택) 프록시 CLASS_TOKEN을 설정했다면 같은 값
  // 멘티가 고를 수 있는 모델 목록 — 워커의 ALLOWED_MODELS와 일치.
  window.MENTO_AI_MODELS = [{ id: "gpt-5.4-nano", label: "GPT-5.4 nano (OpenAI)" }, { id: "gemini-3.1-flash-lite", label: "Gemini 3.1 Flash-Lite" }, { id: "deepseek-v4-flash", label: "DeepSeek V4 Flash" }];
</script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
}
</script>
</body>
</html>
